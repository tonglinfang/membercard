name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # または使用しているメインブランチ名（masterなど）に変更してください

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          # GitHub の Settings > Secrets > Actions で VITE_LIFF_ID を設定してください
          VITE_LIFF_ID: ${{ secrets.VITE_LIFF_ID }}

      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages # 公開用のブランチ名
